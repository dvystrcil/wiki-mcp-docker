# Release pipeline for wiki-mcp.
#
# Triggered by a published GitHub release. Retags the existing `:dev`
# image (built by build.yaml on push to main) as the release semver,
# matching the open-terminal pattern. Single-arch (linux/amd64) so we
# use `docker buildx imagetools create` to retag — no manifest dance.
#
# This is the homelab semver convention: deploys pin the semver tag
# in the deploy repo, no ImageUpdater needed. Bumps are manual via
# GitHub releases — release === intentional deploy candidate.

name: release

on:
  release:
    types: [published]

env:
  INTERNAL_REGISTRY: harbor-core.harbor.svc.cluster.local
  PROJECT: ai
  IMAGE_NAME: wiki-mcp

jobs:
  promote:
    runs-on: wiki-mcp-docker-runner
    permissions:
      contents: write

    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: prod
          project-slug: homelab-bz-gt
          secret-path: /
          export-type: env
          domain: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080

      - name: Log in to Harbor (internal)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.INTERNAL_REGISTRY }}
          username: ${{ env.HB_USERNAME }}
          password: ${{ env.HB_PASSWORD }}

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor-core.harbor.svc.cluster.local"]
              ca=["/etc/ssl/certs/ca-certificates.crt"]

      - name: Extract semver metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Retag the existing :dev → semver + major.minor + latest, no rebuild.
      # `buildx imagetools create -t` copies the manifest under a new tag
      # without pulling/pushing layers. Single-arch, so this is just a
      # tag-pointer copy.
      - name: Promote dev image to release tags
        run: |
          SRC=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:dev
          for TAG in $(jq -cr '[.tags[]] | unique | .[]' <<< "$DOCKER_METADATA_OUTPUT_JSON"); do
            echo "→ retagging $SRC as $TAG"
            docker buildx imagetools create -t "$TAG" "$SRC"
          done

      - name: Inspect promoted image
        run: |
          docker buildx imagetools inspect \
            ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Summary
        run: |
          {
            echo "Released: \`${{ steps.meta.outputs.version }}\`"
            echo ""
            echo "Pin in dvystrcil/wiki-mcp:base/deployment.yaml:"
            echo ""
            echo "    image: harbor.sirddail.net/ai/wiki-mcp:${{ steps.meta.outputs.version }}"
          } >> $GITHUB_STEP_SUMMARY
