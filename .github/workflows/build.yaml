# Image build pipeline for wiki-mcp.
#
# Pattern mirrors rpg-dice-mcp-docker / mcp-server-docker (canonical homelab
# Go MCP shape): in-cluster ARC runner + Infisical secrets + push to harbor-core.
#
# Prerequisite: the `wiki-mcp-docker-runner` ARC scale set must be provisioned
# in dvystrcil/argocd-projects:arc/arc-build-runners.yaml.

name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.github/CODEOWNERS'
  pull_request:
  workflow_dispatch:

env:
  INTERNAL_REGISTRY: harbor-core.harbor.svc.cluster.local
  PROJECT: ai
  IMAGE_NAME: wiki-mcp

jobs:
  test:
    runs-on: wiki-mcp-docker-runner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: go test
        # No -race: needs cgo, but our build is CGO_ENABLED=0 for a static
        # binary and the ARC runner is alpine-without-gcc. Devs can still
        # run `go test -race ./...` locally.
        run: |
          go test -cover ./...

  build:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: wiki-mcp-docker-runner
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: prod
          project-slug: homelab-bz-gt
          secret-path: /
          export-type: env
          domain: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080

      - name: Log in to Harbor (internal)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.INTERNAL_REGISTRY }}
          username: ${{ env.HB_USERNAME }}
          password: ${{ env.HB_PASSWORD }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor-core.harbor.svc.cluster.local"]
              ca=["/etc/ssl/certs/ca-certificates.crt"]

      - name: Extract metadata + tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push (prod target)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "Built: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "    kubectl -n wiki-mcp rollout restart deploy/wiki-mcp" >> $GITHUB_STEP_SUMMARY
